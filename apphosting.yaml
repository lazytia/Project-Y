runConfig:
  minInstances: 0
  maxInstances: 1
  concurrency: 80
  cpu: 1
  memoryMiB: 512

env:
  - variable: NODE_OPTIONS
    value: --max-old-space-size=4096
    availability:
      - BUILD
  - variable: SQUARE_ACCESS_TOKEN
    secret: SQUARE_ACCESS_TOKEN
  - variable: SQUARE_LOCATION_ID
    secret: SQUARE_LOCATION_ID
  - variable: SQUARE_TIMEZONE
    secret: SQUARE_TIMEZONE
  - variable: SQUARE_ENV
    secret: SQUARE_ENV
  - variable: SQUARE_PLATTER_LOCATION_ID
    secret: SQUARE_PLATTER_LOCATION_ID
  # Bearer token for system_yurica integration endpoint (PAX + roster staff).
  - variable: SYSTEM_YURICA_TOKEN
    secret: SYSTEM_YURICA_TOKEN
  # Web Push (VAPID) public key — used by the client to subscribe to FCM.
  - variable: NEXT_PUBLIC_FIREBASE_VAPID_KEY
    secret: NEXT_PUBLIC_FIREBASE_VAPID_KEY
    availability:
      - BUILD
      - RUNTIME
  # Bearer token guarding the cron-style Square sales sync endpoint.
  - variable: SQUARE_SYNC_SHARED_TOKEN
    secret: SQUARE_SYNC_SHARED_TOKEN
  # Bearer token guarding the cron-style Google-Sheet payroll sync endpoint.
  - variable: PAYROLL_SYNC_SHARED_TOKEN
    secret: PAYROLL_SYNC_SHARED_TOKEN
  # Service account JSON with Viewer access to the Pay History sheet.
  - variable: PAYROLL_SHEET_SA_JSON
    secret: PAYROLL_SHEET_SA_JSON
  # Bearer token guarding the nightly Daily Sold Out reset endpoint.
  - variable: SOLD_OUT_RESET_SHARED_TOKEN
    secret: SOLD_OUT_RESET_SHARED_TOKEN
  # Vonage SMS — used by /api/vonage/send-sms to text new staff their
  # login details on approval. Never sent to the browser.
  - variable: VONAGE_API_KEY
    secret: VONAGE_API_KEY
  - variable: VONAGE_API_SECRET
    secret: VONAGE_API_SECRET
  - variable: VONAGE_SENDER_ID
    secret: VONAGE_SENDER_ID
  - variable: VONAGE_FROM_NUMBER
    secret: VONAGE_FROM_NUMBER
