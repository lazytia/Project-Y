<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Matches the boot-splash design in RootLayout: black rounded square
       with a bold white "Y" mark, and the "Project Y" wordmark below.
       pwa-asset-generator centers this on the splash-background colour
       (white in our manifest) so the native iOS launch screen looks
       identical to our React splash. -->
  <rect x="176" y="120" width="160" height="160" rx="40" fill="#111111"/>
  <text x="256" y="240"
        text-anchor="middle"
        font-family="Arial Black, Arial, sans-serif"
        font-weight="900"
        font-size="96"
        fill="#ffffff">Y</text>
  <text x="256" y="330"
        text-anchor="middle"
        font-family="Arial, sans-serif"
        font-weight="600"
        font-size="34"
        letter-spacing="1.5"
        fill="#111111">Project Y</text>
</svg>
